name: "Docker Build & Test"

on:
  pull_request:
    types:
      - opened
      - synchronize
#  push:
#    branches: '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build docker image
        run: make build

      - name: pytest
        run: make test

      - name: pycodestyle
        run: make pycodestyle

      - name: coveralls
        run: make coveralls

